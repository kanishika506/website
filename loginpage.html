<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; 
             background:url('https://i.pinimg.com/originals/f3/0f/bc/f30fbc1c43e236ad47d5aee46e6f6279.jpg') 
             no-repeat center center fixed; 
             background-size:cover;">

  <div style="width:100%; height:100vh; display:flex; justify-content:center; align-items:center;">
    <div style="background:rgba(255,255,255,0.9); padding:40px; border-radius:15px; 
                box-shadow:0px 4px 10px rgba(0,0,0,0.3); width:300px; text-align:center;">
      <h2 style="color:#1E90FF; margin-bottom:20px;">Login</h2>
      
      <form>
        <input type="text" placeholder="Username" 
               style="width:100%; padding:10px; margin:10px 0; border:1px solid #1E90FF; 
                      border-radius:8px; outline:none;"><br>
        <input type="password" placeholder="Password" 
               style="width:100%; padding:10px; margin:10px 0; border:1px solid #1E90FF; 
                      border-radius:8px; outline:none;"><br>
        <button type="submit" 
                style="width:100%; padding:10px; background:#1E90FF; color:white; 
                       border:none; border-radius:8px; font-size:16px; cursor:pointer;">
          Login
        </button>
      </form>
    </div>
  </div>

</body>
</html>

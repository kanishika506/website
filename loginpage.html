<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Olaf Login Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url("/images/olaf4.png") no-repeat center center fixed;
      background-size: cover; /* makes image cover full screen */
      min-height: 100vh;
      display: flex;
    justify-content: center;   /* centers horizontally */
    align-items: center; 
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* changed from center */
      padding-top: 80px;       /* added to move up */
    }
    .login-box {
      width: 420px;           /* increased from 320px */
      max-width: 95%;         /* slightly increased for responsiveness */
      padding: 30px;
      box-sizing: border-box; /* ensures padding is inside width */
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
      margin: 0; /* removes any default margin */
    }
    .login-box h2 {
      margin: 0 0 15px 0;
      font-size: 24px;
      color: #1E90FF;
    }
    .login-box p {
      margin: 0 0 20px 0;
      color: #004080;
      font-size: 13px;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #1E90FF;
      background: rgba(255, 255, 255, 0.8);
      outline: none;
      font-size: 14px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      background: #1E90FF;
      color: white;
      font-size: 15px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }
    .login-box button:hover {
      background: #63b3ff;
      box-shadow: 0 6px 18px rgba(30, 144, 255, 0.4);
      transform: translateY(-2px);
    }
    .login-box a {
      margin-top: 12px;
      font-size: 12px;
      color: #004080;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h2>Welcome</h2>
      <p>Sign in to continue</p>
      <form onsubmit="event.preventDefault(); alert('Demo only — add backend here!');">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <a href="#">Forgot password?</a>
    </div>
  </div>
</body>
</html>
